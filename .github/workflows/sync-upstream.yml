name: Sync Upstream

# Auto-sync upstream tianma-if/edgeever to this fork
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/tianma-if/edgeever.git
          git fetch upstream main

      - name: Merge upstream into main
        run: |
          git merge upstream/main --no-edit --no-ff \
            -m "chore: sync upstream tianma-if/edgeever@$(git rev-parse upstream/main | cut -c1-7)" \
            || { echo "::error::Merge conflict detected, manual resolution required"; exit 1; }

      - name: Push to fork
        run: |
          git push origin main

      - name: Summary
        if: always()
        run: |
          echo "### Sync Upstream Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Upstream: tianma-if/edgeever@main" >> $GITHUB_STEP_SUMMARY
          echo "- Fork: ${{ github.repository }}@main" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
